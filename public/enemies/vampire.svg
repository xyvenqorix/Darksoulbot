<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Vampiro de Ceniza - Pixel Art Style Boss -->
  <!-- Capa -->
  <rect x="8" y="20" width="48" height="40" fill="#2a0a0a"/>
  <rect x="12" y="24" width="40" height="32" fill="#1a0505"/>
  <!-- Interior capa rojo -->
  <rect x="20" y="28" width="24" height="28" fill="#5a1010"/>
  <!-- Cuerpo -->
  <rect x="24" y="28" width="16" height="20" fill="#1a1a2a"/>
  <!-- Cabeza pálida -->
  <rect x="22" y="8" width="20" height="18" fill="#d4c4b4"/>
  <!-- Cabello negro -->
  <rect x="20" y="4" width="24" height="8" fill="#0a0a0a"/>
  <rect x="18" y="8" width="4" height="8" fill="#0a0a0a"/>
  <rect x="42" y="8" width="4" height="8" fill="#0a0a0a"/>
  <!-- Ojos rojos brillantes -->
  <rect x="26" y="14" width="4" height="4" fill="#ff0000"/>
  <rect x="34" y="14" width="4" height="4" fill="#ff0000"/>
  <rect x="27" y="15" width="2" height="2" fill="#ffaaaa"/>
  <rect x="35" y="15" width="2" height="2" fill="#ffaaaa"/>
  <!-- Boca con colmillos -->
  <rect x="28" y="20" width="8" height="2" fill="#3a0a0a"/>
  <rect x="29" y="22" width="2" height="3" fill="#ffffff"/>
  <rect x="33" y="22" width="2" height="3" fill="#ffffff"/>
  <!-- Cuello alto -->
  <rect x="20" y="24" width="4" height="8" fill="#2a0a0a"/>
  <rect x="40" y="24" width="4" height="8" fill="#2a0a0a"/>
  <!-- Manos garras -->
  <rect x="12" y="40" width="8" height="6" fill="#c4b4a4"/>
  <rect x="44" y="40" width="8" height="6" fill="#c4b4a4"/>
  <rect x="10" y="44" width="2" height="4" fill="#8a0a0a"/>
  <rect x="14" y="44" width="2" height="4" fill="#8a0a0a"/>
  <rect x="52" y="44" width="2" height="4" fill="#8a0a0a"/>
  <rect x="48" y="44" width="2" height="4" fill="#8a0a0a"/>
  <!-- Aura oscura -->
  <rect x="4" y="56" width="56" height="4" fill="#0a0505" opacity="0.5"/>
</svg>
