<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Hoguera - Pixel Art Style -->
  <!-- Base de piedras -->
  <rect x="12" y="52" width="40" height="8" fill="#3a3a3a"/>
  <rect x="16" y="48" width="32" height="6" fill="#4a4a4a"/>
  <rect x="20" y="44" width="24" height="6" fill="#5a5a5a"/>
  <!-- Leña -->
  <rect x="22" y="40" width="20" height="6" fill="#4a3020"/>
  <rect x="20" y="42" width="6" height="4" fill="#5a4030" transform="rotate(-15 23 44)"/>
  <rect x="38" y="42" width="6" height="4" fill="#5a4030" transform="rotate(15 41 44)"/>
  <!-- Fuego base -->
  <rect x="26" y="32" width="12" height="12" fill="#ff4400"/>
  <!-- Fuego medio -->
  <rect x="28" y="24" width="8" height="12" fill="#ff6600"/>
  <rect x="24" y="28" width="6" height="8" fill="#ff5500"/>
  <rect x="34" y="28" width="6" height="8" fill="#ff5500"/>
  <!-- Fuego alto -->
  <rect x="30" y="16" width="4" height="12" fill="#ff8800"/>
  <rect x="26" y="20" width="4" height="8" fill="#ff7700"/>
  <rect x="34" y="20" width="4" height="8" fill="#ff7700"/>
  <!-- Llamas superiores -->
  <rect x="28" y="10" width="3" height="8" fill="#ffaa00"/>
  <rect x="33" y="12" width="3" height="6" fill="#ffaa00"/>
  <rect x="24" y="14" width="2" height="6" fill="#ff9900"/>
  <rect x="38" y="16" width="2" height="4" fill="#ff9900"/>
  <!-- Centro brillante -->
  <rect x="30" y="28" width="4" height="8" fill="#ffcc00"/>
  <rect x="31" y="24" width="2" height="6" fill="#ffdd00"/>
  <!-- Chispas -->
  <rect x="22" y="8" width="2" height="2" fill="#ffaa00"/>
  <rect x="40" y="10" width="2" height="2" fill="#ff8800"/>
  <rect x="32" y="4" width="2" height="2" fill="#ffcc00"/>
  <rect x="18" y="14" width="1" height="1" fill="#ff6600"/>
  <rect x="44" y="12" width="1" height="1" fill="#ff6600"/>
  <!-- Espada clavada (referencia Dark Souls) -->
  <rect x="44" y="24" width="2" height="20" fill="#6a6a6a"/>
  <rect x="42" y="32" width="6" height="2" fill="#5a5a5a"/>
  <rect x="43" y="22" width="4" height="4" fill="#4a4a4a"/>
</svg>
